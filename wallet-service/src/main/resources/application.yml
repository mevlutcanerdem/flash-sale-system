      group-id: wallet-group-v3 # D?KKAT: V2 yapt?k! Yeni bir sayfa a�?yoruz.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer # JSON de?il, art?k d�z STRING okuyaca??z!