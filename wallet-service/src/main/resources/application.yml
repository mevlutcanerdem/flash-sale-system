server:
  port: 8082

spring:
  application:
    name: wallet-service

  datasource:
    url: jdbc:postgresql://localhost:5432/wallet_db
    username: admin
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

